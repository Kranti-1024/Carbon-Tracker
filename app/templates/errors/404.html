{% extends "base.html" %}
{% block title %}Page not found{% endblock %}

{% block content %}
<div class="error-wrap anim-fade">
  <div class="error-code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  {% if current_user.is_authenticated %}
    <a href="{{ url_for('dashboard.index') }}" class="btn-primary">Back to dashboard</a>
  {% else %}
    <a href="{{ url_for('main.landing') }}" class="btn-primary">Back to home</a>
  {% endif %}
</div>
{% endblock %}
