{% extends "base.html" %}
{% block title %}Log in{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card anim-fade">
    <h1>Welcome back</h1>
    <p class="auth-sub">Pick up your ledger where you left off.</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required>
      </div>
      <div class="field field-row">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Stay logged in</label>
      </div>
      <button type="submit" class="btn-block">Log in</button>
    </form>

    <p class="auth-switch">New here? <a href="{{ url_for('auth.signup') }}">Create an account</a></p>
  </div>
</div>
{% endblock %}
