{% extends "base.html" %}
{% block title %}Start tracking{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card anim-fade">
    <h1>Start your ledger</h1>
    <p class="auth-sub">Takes under a minute. No credit card, no fine print.</p>

    <form method="POST" action="{{ url_for('auth.signup') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn-block">Create account</button>
    </form>

    <p class="auth-switch">Already tracking? <a href="{{ url_for('auth.login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
